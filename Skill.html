        #sidebar {
            background-color: #e6a341;
            top: 70px;
            left: 0;
            position: fixed;
            font-size: 20px;
            width: 200px;
            height: calc(100vh - 70px);
            transform: translateX(-100%);
            transition: transform 0.3s ease-in-out;

        #sidebar.show {

        }

        #content {

            padding: 10px 0;
        }

        #sidebar a:hover {
